version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: indiawish-db
    environment:
      POSTGRES_DB: indiawish
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - indiawish-network

  redis:
    image: redis:7-alpine
    container_name: indiawish-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - indiawish-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indiawish-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/indiawish
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your_super_secret_jwt_key_here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - postgres
      - redis
    networks:
      - indiawish-network

volumes:
  postgres_data:
  redis_data:


networks:
  indiawish-network:
    driver: bridge
